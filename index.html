<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexi Sammelbuch</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <h1>🐾 Flexi Sammelbuch</h1>
</header>

<div id="category-buttons">
    <button data-category="tiere" class="cat-btn active">🐾 Tiere</button>
    <button data-category="accessoires" class="cat-btn">🎒 Accessoires</button>
    <button data-category="geschenke" class="cat-btn">🎁 Geschenke / Eier</button>
</div>

<button id="theme-toggle" class="theme-toggle">🌙 Dark Mode</button>

<section class="controls">
  <input id="search-input" type="search" placeholder="Suche nach Name oder Beschreibung" />
  <select id="rarity-filter">
    <option value="all">Alle Seltenheiten</option>
    <option value="Exclusiv">Exclusiv</option>
    <option value="Legendär">Legendär</option>
    <option value="Extrem_Selten">Extrem Selten</option>
    <option value="Selten">Selten</option>
    <option value="ungewöhnlich">ungewöhnlich</option>
    <option value="gewöhnlich">gewöhnlich</option>
  </select>
  <button id="clear-filters">Filter zurücksetzen</button>
</section>

<main>
    <div id="flexi-container" class="grid"></div>
</main>

<script src="script.js"></script>
</body>
</html>
